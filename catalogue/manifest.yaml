apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://<MONGODB-SERVER-IPADDRESS>:27017/catalogue"
  
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    environment: dev
    tier: backend
spec:
  replicas: 1  
  selector:
   matchLabels:
      project: roboshop
      component: catalogue
      environment: dev
      tier: backend     
  template:
    metadata:
      labels:
          project: roboshop
          component: catalogue
          environment: dev
          tier: backend
    spec:
      containers:
      - name: catalogue
        image: narayanareddy2026/catalogue:v1
        envFrom:
          - configMapRef:
              name: catalogue
        imagePullPolicy: Always      

        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15

        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: catalogue
    environment: dev
    tier: backend
  ports:
    - port: 8080
      targetPort: 8080  