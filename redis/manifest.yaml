apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: redis
      environment: dev
      tier: db
template:
  metadata:
    labels:
      project: roboshop
      component: redis
      environment: dev
      tier: db
  spec:
    containers:
    - name: redis
      image: redis:7.0
      imagePullPolicy: Always

      readinessProbe:
        tcpSocket: 
          port: 6379
        initialDelaySeconds: 10
        periodSeconds: 10

      livenessProbe:
        tcpSocket:
          port: 6379
        initialDelaySeconds: 5
        periodSeconds: 5    
             
---
apiVersion: v1
kind: service
metadata:
  name: redis
  namespace: roboshop
spec: 
  selector:
    project: roboshop
    component: redis
    environment: dev
    tier: db  
  ports:
    - port: 6379
      targetPort: 6379             