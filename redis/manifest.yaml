apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  network: roboshop
  labels:
    project: roboshop
    component: redis
    environment: dev
    tier: db
spec:
  replicas: 1
  selectors:
    matchLabels:
      project: roboshop
      component: redis
      environment: dev
      tier: db
template:
  metadata:
    labels:
      project: roboshop
      component: redis
      environment: dev
      tier: db
  spec:
    containers:
    - name: redis
      image: narayanareddy2026/redis:v1
      imagePullPolicy: Always
      ports:
        - name: liveness-port
          containerPort: 6379

      readinessProbe:
        tcpSocket: /health
          port: 6379
        initialDelaySeconds: 10
        periodSeconds: 10

      livenessProbe:
        tcpSocket:
          port: 6379
        initialDelaySeconds: 5
        periodSeconds: 55    
             
---
apiVersion: v1
kind: service
metadata:
  name: redis
  namespace: roboshop
spec: 
  selector:
    project: roboshop
    component: redis
    environment: dev
    tier: db  
  ports:
    - port: 6379
      targetPort: 6379             