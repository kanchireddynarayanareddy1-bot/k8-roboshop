apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  network: roboshop
  labels:
    project: roboshop
    component: redis
    environment: dev
    tier: db
spec:
  replicas: 1
  selectors:
    matchLabels:
      project: roboshop
      component: redis
      environment: dev
      tier: db
  spec:
    containers:
     - name: redis
       image: redis:07 
             
---
apiVersion: v1
kind: service
metadata:
  name: redis
  namespace: roboshop
spec: 
  selector:
    project: roboshop
    component: redis
    environment: dev
    tier: db  
  ports:
    - port: 6379
      targetPort: 6379             