apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      environment: dev
      tier: db
  template:
    metadata:
      labels:
          project: roboshop
          component: mongodb
          environment: dev
          tier: db
    spec:
      containers:
      - name: mongodb
        image: narayanareddy2026/mongodb:v1
        imagePullPolicy: Always

        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 55

---
apiVersion: v1
kind: Service 
metadata:
  name: mongodb
  namespace: roboshop
spec:  
  selector:
    project: roboshop
    component: mongodb
    environment: dev
    tier: db
  ports:
    - port: 27017
      targetPort: 27017