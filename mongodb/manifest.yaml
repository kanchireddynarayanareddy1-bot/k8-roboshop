apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      environment: dev
      tier: db
  template:
    metadata:
      labels:
          project: roboshop
          component: mongodb
          environment: dev
          tier: db
    spec:
      conatainers:
      - name: mongodb
        image: narayanareddy2026/mongodb:v1  
        readynessprobe:
          tcpSocket:
            port: 27017
          intialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          intialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service 
metadata:
  name: mongodb
  namespace: roboshop
  selector:
    project: roboshop
    component: mongodb
    environment: dev
    tier: db
spec:
  ports:
    - port: 27017
      targetPort: 27017