apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      environment: dev
      tier: db
  template:
    metadata:
      labels:
          project: roboshop
          component: mysql
          environment: dev
          tier: db
    spec:
      containers:
      - name: mysql
        image: narayanareddy2026/mysql:v1
        imagePullPolicy: Always

        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 5
          periodSeconds: 55

---
apiVersion: v1
kind: Service 
metadata:
  name: mysql
  namespace: roboshop
spec:  
  selector:
    project: roboshop
    component: mysql
    environment: dev
    tier: db
  ports:
    - port: 3306
      targetPort: 3306